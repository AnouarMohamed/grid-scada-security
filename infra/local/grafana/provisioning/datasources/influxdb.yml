apiVersion: 1

deleteDatasources:
  - name: GridGuard InfluxDB
    orgId: 1

prune: true

datasources:
  - name: GridGuard InfluxDB
    uid: gridguard-influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
      timeout: 10
    secureJsonData:
      token: $INFLUXDB_ADMIN_TOKEN
