  <path d="M1004 551C760 710 360 674 149 412" class="attack-flow"/>

  <text x="548" y="398" class="label">Boundary invariants</text>
  <text x="548" y="420" class="component-text">- source stays OT-side</text>
  <text x="548" y="438" class="component-text">- DBs stay cloud-side</text>
  <text x="548" y="456" class="component-text">- ingestor is bridge</text>
  <text x="548" y="474" class="component-text">- mTLS/policy next</text>

  <rect x="40" y="648" width="1240" height="134" class="lane"/>
  <text x="60" y="674" class="lane-subtitle">CONTROL PLANE</text>
  <text x="60" y="697" class="lane-title">CI/CD, infrastructure as code, and local integration checks</text>

  <rect x="60" y="724" width="142" height="34" class="component-ci"/>
  <text x="82" y="745" class="component-title">GitHub Actions</text>
  <rect x="228" y="724" width="142" height="34" class="component-ci"/>
  <text x="264" y="745" class="component-title">Terraform</text>
