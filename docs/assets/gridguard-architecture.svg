  <path d="M684 233H744" class="telemetry-flow"/>
  <path d="M852 268V320" class="telemetry-flow"/>
  <path d="M852 398V450" class="telemetry-flow"/>
  <path d="M852 528V570" class="telemetry-flow"/>

  <path d="M236 363H296" class="control-flow"/>
  <path d="M472 363C492 363 492 269 532 269" class="control-flow"/>

