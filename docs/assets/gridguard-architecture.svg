<svg width="1320" height="900" viewBox="0 0 1320 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GridGuard end-state reference architecture</title>
  <desc id="desc">End-state reference architecture for the GridGuard SCADA security lab, showing the digital twin, OT protocol emulator, OT/IT ingestion bridge, cloud telemetry platform, detection stack, attack harness, and CI/CD control plane.</desc>

  <defs>
    <pattern id="paperGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#E2E8F0" stroke-width="1"/>
    </pattern>
    <marker id="arrowTelemetry" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowControl" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#64748B"/>
    </marker>
    <marker id="arrowDetection" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#047857"/>
    </marker>
    <marker id="arrowAttack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#B91C1C"/>
    </marker>
    <style>
      .bg { fill: #F8FAFC; }
      .grid { fill: url(#paperGrid); opacity: 0.55; }
      .title { fill: #0F172A; font: 700 30px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 14px Arial, sans-serif; }
      .lane { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.4; }
      .lane-power { fill: #FFFFFF; stroke: #94A3B8; stroke-width: 1.4; }
      .lane-ot { fill: #F0F9FF; stroke: #0284C7; stroke-width: 1.6; }
      .lane-boundary { fill: #FFFBEB; stroke: #D97706; stroke-width: 1.8; }
      .lane-cloud { fill: #F8FAFC; stroke: #2563EB; stroke-width: 1.6; }
      .lane-security { fill: #FDF2F8; stroke: #BE123C; stroke-width: 1.4; }
      .lane-title { fill: #0F172A; font: 700 15px Arial, sans-serif; }
      .lane-subtitle { fill: #64748B; font: 600 10px Arial, sans-serif; letter-spacing: 0.7px; }
      .component { fill: #FFFFFF; stroke: #334155; stroke-width: 1.3; }
      .component-telemetry { fill: #EFF6FF; stroke: #2563EB; stroke-width: 1.7; }
      .component-boundary { fill: #FFF7ED; stroke: #D97706; stroke-width: 1.7; }
      .component-detection { fill: #F0FDF4; stroke: #047857; stroke-width: 1.5; }
      .component-attack { fill: #FEF2F2; stroke: #B91C1C; stroke-width: 1.5; }
      .component-ci { fill: #F8FAFC; stroke: #475569; stroke-width: 1.1; }
      .component-title { fill: #0F172A; font: 700 13px Arial, sans-serif; }
      .component-text { fill: #475569; font: 500 11px Arial, sans-serif; }
      .mono { fill: #334155; font: 600 10px "Courier New", monospace; }
      .step { fill: #FFFFFF; stroke: #0F172A; stroke-width: 1.2; }
      .step-text { fill: #0F172A; font: 700 10px Arial, sans-serif; }
      .boundary-line { stroke: #D97706; stroke-width: 2; stroke-dasharray: 8 6; }
      .telemetry-flow { stroke: #2563EB; stroke-width: 2.8; marker-end: url(#arrowTelemetry); }
      .control-flow { stroke: #64748B; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrowControl); }
      .detection-flow { stroke: #047857; stroke-width: 2.4; marker-end: url(#arrowDetection); }
      .attack-flow { stroke: #B91C1C; stroke-width: 2.3; stroke-dasharray: 7 6; marker-end: url(#arrowAttack); }
      .ci-flow { stroke: #64748B; stroke-width: 1.7; stroke-dasharray: 5 5; marker-end: url(#arrowControl); }
      .label { fill: #334155; font: 700 10px Arial, sans-serif; }
      .legend { fill: #334155; font: 600 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1320" height="900" class="bg"/>
  <rect width="1320" height="900" class="grid"/>

  <text x="40" y="48" class="title">GridGuard SCADA Security Lab - End-State Architecture</text>
  <text x="40" y="72" class="subtitle">Target final system: digital twin, industrial protocol surface, controlled OT/IT bridge, telemetry platform, detection stack, attack harness, and CI/CD controls.</text>

  <rect x="40" y="108" width="216" height="542" class="lane-power"/>
  <rect x="276" y="108" width="216" height="542" class="lane-ot"/>
  <rect x="512" y="108" width="192" height="542" class="lane-boundary"/>
  <rect x="724" y="108" width="256" height="542" class="lane-cloud"/>
  <rect x="1000" y="108" width="280" height="542" class="lane-security"/>

  <text x="60" y="134" class="lane-subtitle">POWER SYSTEMS TRACK</text>
  <text x="60" y="157" class="lane-title">Digital twin and scenarios</text>
  <text x="296" y="134" class="lane-subtitle">OT LAB NETWORK</text>
  <text x="296" y="157" class="lane-title">Industrial protocol surface</text>
  <text x="532" y="134" class="lane-subtitle">TRUST BOUNDARY</text>
  <text x="532" y="157" class="lane-title">OT/IT bridge</text>
  <text x="744" y="134" class="lane-subtitle">CLOUD TELEMETRY ZONE</text>
  <text x="744" y="157" class="lane-title">Storage, dashboards, evidence</text>
  <text x="1020" y="134" class="lane-subtitle">SECURITY OPERATIONS</text>
  <text x="1020" y="157" class="lane-title">Detection and response</text>

  <line x1="503" y1="108" x2="503" y2="650" class="boundary-line"/>
  <text x="455" y="96" class="label">OT boundary</text>

  <rect x="60" y="190" width="176" height="86" class="component"/>
  <text x="78" y="215" class="component-title">Distribution digital twin</text>
  <text x="78" y="236" class="component-text">IEEE feeder model</text>
  <text x="78" y="252" class="mono">loads + DER + states</text>

  <rect x="60" y="320" width="176" height="86" class="component"/>
  <text x="78" y="345" class="component-title">Scenario engine</text>
  <text x="78" y="366" class="component-text">load, DER, outage profiles</text>
  <text x="78" y="382" class="mono">baseline + attack cases</text>

  <rect x="60" y="450" width="176" height="86" class="component"/>
  <text x="78" y="475" class="component-title">Ground-truth recorder</text>
  <text x="78" y="496" class="component-text">expected state history</text>
  <text x="78" y="512" class="mono">run logs + labels</text>

  <rect x="296" y="190" width="176" height="86" class="component-telemetry"/>
  <text x="314" y="215" class="component-title">Protocol emulator</text>
  <text x="314" y="236" class="component-text">Modbus TCP and DNP3</text>
  <text x="314" y="252" class="mono">register map + polling</text>

  <rect x="296" y="320" width="176" height="86" class="component"/>
  <text x="314" y="345" class="component-title">OT network segment</text>
  <text x="314" y="366" class="component-text">segmented subnet</text>
  <text x="314" y="382" class="mono">firewall + packet tap</text>

  <rect x="296" y="450" width="176" height="86" class="component"/>
  <text x="314" y="475" class="component-title">Replay test fixture</text>
  <text x="314" y="496" class="component-text">deterministic regression data</text>
  <text x="314" y="512" class="mono">same telemetry schema</text>

  <rect x="532" y="190" width="152" height="106" class="component-boundary"/>
  <text x="550" y="215" class="component-title">Telemetry ingestor</text>
  <text x="550" y="238" class="component-text">poll/listen at OT edge</text>
  <text x="550" y="254" class="component-text">validate and normalize</text>
  <text x="550" y="270" class="component-text">write cloud telemetry</text>
  <text x="550" y="288" class="mono">only dual-homed</text>

  <rect x="532" y="360" width="152" height="130" class="component-boundary"/>
  <text x="550" y="385" class="component-title">Boundary invariants</text>
  <text x="550" y="410" class="component-text">source stays OT-side</text>
  <text x="550" y="428" class="component-text">DBs stay cloud-side</text>
  <text x="550" y="446" class="component-text">ingestor is the bridge</text>
  <text x="550" y="464" class="component-text">mTLS and policy enforced</text>

  <rect x="744" y="190" width="216" height="78" class="component-telemetry"/>
  <text x="762" y="215" class="component-title">Stream buffer</text>
  <text x="762" y="236" class="component-text">queue or durable replay log</text>
  <text x="762" y="252" class="mono">backpressure + ordering</text>

  <rect x="744" y="320" width="216" height="78" class="component-telemetry"/>
  <text x="762" y="345" class="component-title">Time-series database</text>
  <text x="762" y="366" class="component-text">InfluxDB or TimescaleDB</text>
  <text x="762" y="382" class="mono">grid_telemetry schema</text>

  <rect x="744" y="450" width="216" height="78" class="component-telemetry"/>
  <text x="762" y="475" class="component-title">Grafana and reports</text>
  <text x="762" y="496" class="component-text">dashboards, review views</text>
  <text x="762" y="512" class="mono">ops + demo visibility</text>

  <rect x="744" y="570" width="216" height="56" class="component"/>
  <text x="762" y="595" class="component-title">Evidence store</text>
  <text x="762" y="616" class="component-text">attack runs, alerts, artifacts</text>

  <rect x="1020" y="190" width="240" height="78" class="component-detection"/>
  <text x="1038" y="215" class="component-title">Network IDS</text>
  <text x="1038" y="236" class="component-text">Suricata/Zeek boundary sensors</text>
  <text x="1038" y="252" class="mono">flows + protocol anomalies</text>

  <rect x="1020" y="320" width="240" height="78" class="component-detection"/>
  <text x="1038" y="345" class="component-title">Telemetry anomaly detector</text>
  <text x="1038" y="366" class="component-text">range, drift, topology checks</text>
  <text x="1038" y="382" class="mono">FDIA detection logic</text>

  <rect x="1020" y="450" width="240" height="78" class="component"/>
  <text x="1038" y="475" class="component-title">SIEM and alerting</text>
  <text x="1038" y="496" class="component-text">Wazuh or ELK target</text>
  <text x="1038" y="512" class="mono">cases + escalation trail</text>

  <rect x="1020" y="570" width="240" height="56" class="component-attack"/>
  <text x="1038" y="595" class="component-title">Attack harness</text>
  <text x="1038" y="616" class="component-text">FDIA, flooding, MITM-style tests</text>

  <circle cx="266" cy="233" r="12" class="step"/>
  <text x="263" y="237" class="step-text">1</text>
  <circle cx="502" cy="233" r="12" class="step"/>
  <text x="499" y="237" class="step-text">2</text>
  <circle cx="714" cy="233" r="12" class="step"/>
  <text x="711" y="237" class="step-text">3</text>

