  <rect x="40" y="845" width="1240" height="1" fill="#CBD5E1"/>
  <line x1="58" y1="866" x2="92" y2="866" class="telemetry-flow"/>
  <text x="104" y="870" class="legend">Telemetry path</text>
  <line x1="244" y1="866" x2="278" y2="866" class="control-flow"/>
