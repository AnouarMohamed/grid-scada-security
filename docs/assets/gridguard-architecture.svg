  <path d="M960 359H1020" class="detection-flow"/>
  <path d="M960 598H990V489H1020" class="detection-flow"/>
  <path d="M1140 268V320" class="detection-flow"/>
  <path d="M1140 398V450" class="detection-flow"/>

  <path d="M1020 598H992V638H50V363H60" class="attack-flow"/>
  <path d="M1020 598H992V646H286V286H384V276" class="attack-flow"/>

  <rect x="40" y="690" width="1240" height="130" class="lane"/>
  <text x="60" y="716" class="lane-subtitle">CONTROL PLANE</text>
  <text x="60" y="739" class="lane-title">CI/CD, infrastructure as code, supply-chain checks, secrets, deployment approvals, and integration smoke tests</text>

  <rect x="60" y="766" width="130" height="34" class="component-ci"/>
  <text x="86" y="787" class="component-title">GitHub Actions</text>
  <rect x="210" y="766" width="130" height="34" class="component-ci"/>
  <text x="246" y="787" class="component-title">Terraform</text>
  <rect x="360" y="766" width="130" height="34" class="component-ci"/>
  <text x="389" y="787" class="component-title">Containers</text>
  <rect x="510" y="766" width="130" height="34" class="component-ci"/>
  <text x="540" y="787" class="component-title">Ruff/Bandit</text>
  <rect x="660" y="766" width="130" height="34" class="component-ci"/>
  <text x="684" y="787" class="component-title">Gitleaks/Trivy</text>
  <rect x="810" y="766" width="130" height="34" class="component-ci"/>
  <text x="838" y="787" class="component-title">OIDC/Secrets</text>
  <rect x="960" y="766" width="130" height="34" class="component-ci"/>
  <text x="990" y="787" class="component-title">Smoke tests</text>
  <rect x="1110" y="766" width="130" height="34" class="component-ci"/>
  <text x="1135" y="787" class="component-title">Deploy gates</text>

