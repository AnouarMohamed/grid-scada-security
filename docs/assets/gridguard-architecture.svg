<svg width="1320" height="860" viewBox="0 0 1320 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GridGuard reference architecture</title>
  <desc id="desc">Reference architecture for the GridGuard SCADA security lab, showing power simulation, OT network, OT to cloud ingestion boundary, cloud telemetry storage, Grafana, detection services, attack exercises, and CI/CD controls.</desc>

  <defs>
    <pattern id="paperGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#E2E8F0" stroke-width="1"/>
    </pattern>
    <marker id="arrowCurrent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowPlanned" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#64748B"/>
    </marker>
    <marker id="arrowSecurity" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#047857"/>
    </marker>
    <marker id="arrowAttack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#B91C1C"/>
    </marker>
    <style>
      .bg { fill: #F8FAFC; }
      .grid { fill: url(#paperGrid); opacity: 0.55; }
      .title { fill: #0F172A; font: 700 30px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 14px Arial, sans-serif; }
      .lane { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.4; }
      .lane-ot { fill: #F0F9FF; stroke: #0284C7; stroke-width: 1.6; }
      .lane-boundary { fill: #FFFBEB; stroke: #D97706; stroke-width: 1.8; }
      .lane-cloud { fill: #F8FAFC; stroke: #2563EB; stroke-width: 1.6; }
      .lane-security { fill: #FDF2F8; stroke: #BE123C; stroke-width: 1.4; }
      .lane-title { fill: #0F172A; font: 700 15px Arial, sans-serif; }
      .lane-subtitle { fill: #64748B; font: 600 10px Arial, sans-serif; letter-spacing: 0.7px; }
      .component { fill: #FFFFFF; stroke: #334155; stroke-width: 1.3; }
      .component-current { fill: #EFF6FF; stroke: #2563EB; stroke-width: 1.7; }
      .component-planned { fill: #FFFFFF; stroke: #64748B; stroke-width: 1.4; stroke-dasharray: 7 5; }
      .component-boundary { fill: #FFF7ED; stroke: #D97706; stroke-width: 1.7; }
      .component-security { fill: #F0FDF4; stroke: #047857; stroke-width: 1.5; }
      .component-attack { fill: #FEF2F2; stroke: #B91C1C; stroke-width: 1.5; }
      .component-ci { fill: #F8FAFC; stroke: #475569; stroke-width: 1.1; }
      .component-title { fill: #0F172A; font: 700 13px Arial, sans-serif; }
      .component-text { fill: #475569; font: 500 11px Arial, sans-serif; }
      .mono { fill: #334155; font: 600 10px "Courier New", monospace; }
      .step { fill: #FFFFFF; stroke: #0F172A; stroke-width: 1.2; }
      .step-text { fill: #0F172A; font: 700 10px Arial, sans-serif; }
      .boundary-line { stroke: #D97706; stroke-width: 2; stroke-dasharray: 8 6; }
      .current-flow { stroke: #2563EB; stroke-width: 2.8; marker-end: url(#arrowCurrent); }
      .planned-flow { stroke: #64748B; stroke-width: 2.3; stroke-dasharray: 8 6; marker-end: url(#arrowPlanned); }
      .security-flow { stroke: #047857; stroke-width: 2.4; marker-end: url(#arrowSecurity); }
      .attack-flow { stroke: #B91C1C; stroke-width: 2.3; stroke-dasharray: 7 6; marker-end: url(#arrowAttack); }
      .label { fill: #334155; font: 700 10px Arial, sans-serif; }
      .legend { fill: #334155; font: 600 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1320" height="860" class="bg"/>
  <rect width="1320" height="860" class="grid"/>

  <text x="40" y="48" class="title">GridGuard SCADA Security Lab - Reference Architecture</text>
  <text x="40" y="72" class="subtitle">Current local fake-data pipeline plus the planned Modbus/DNP3 handoff, detection loop, and CI/CD guardrails.</text>

  <rect x="40" y="108" width="218" height="502" class="lane"/>
  <rect x="276" y="108" width="218" height="502" class="lane-ot"/>
  <rect x="512" y="108" width="178" height="502" class="lane-boundary"/>
  <rect x="708" y="108" width="258" height="502" class="lane-cloud"/>
  <rect x="984" y="108" width="296" height="502" class="lane-security"/>

  <text x="60" y="134" class="lane-subtitle">POWER SYSTEMS TRACK</text>
  <text x="60" y="157" class="lane-title">Simulation source</text>
  <text x="296" y="134" class="lane-subtitle">OT LAB NETWORK</text>
  <text x="296" y="157" class="lane-title">Protocol surface</text>
  <text x="532" y="134" class="lane-subtitle">TRUST BOUNDARY</text>
  <text x="532" y="157" class="lane-title">OT/IT bridge</text>
  <text x="728" y="134" class="lane-subtitle">CLOUD TELEMETRY ZONE</text>
  <text x="728" y="157" class="lane-title">Storage and visibility</text>
  <text x="1004" y="134" class="lane-subtitle">SECURITY OPERATIONS</text>
  <text x="1004" y="157" class="lane-title">Detection and response</text>

  <line x1="503" y1="108" x2="503" y2="610" class="boundary-line"/>
  <text x="455" y="96" class="label">OT boundary</text>

  <rect x="60" y="196" width="178" height="74" class="component"/>
  <text x="78" y="221" class="component-title">Feeder model</text>
  <text x="78" y="242" class="component-text">IEEE 13/34-bus target</text>
  <text x="78" y="258" class="mono">loads + DER + states</text>

  <rect x="60" y="328" width="178" height="84" class="component"/>
  <text x="78" y="353" class="component-title">Scenario engine</text>
  <text x="78" y="374" class="component-text">baseline load variation</text>
  <text x="78" y="390" class="component-text">false-data profiles</text>

  <rect x="296" y="196" width="178" height="84" class="component-current"/>
  <text x="314" y="221" class="component-title">Fake grid source</text>
  <text x="314" y="242" class="component-text">running today in Compose</text>
  <text x="314" y="258" class="mono">GET /measurements</text>

  <rect x="296" y="332" width="178" height="90" class="component-planned"/>
  <text x="314" y="357" class="component-title">Modbus/DNP3 emulator</text>
  <text x="314" y="378" class="component-text">planned real handoff</text>
  <text x="314" y="394" class="mono">TCP 502 + register map</text>

  <rect x="532" y="232" width="138" height="114" class="component-boundary"/>
  <text x="550" y="258" class="component-title">Telemetry ingestor</text>
  <text x="550" y="281" class="component-text">only dual-homed</text>
  <text x="550" y="297" class="component-text">normalize schema</text>
  <text x="550" y="313" class="component-text">write time series</text>
  <text x="550" y="333" class="mono">no host exposure</text>

  <rect x="728" y="196" width="218" height="82" class="component-current"/>
  <text x="746" y="221" class="component-title">Time-series database</text>
  <text x="746" y="242" class="component-text">InfluxDB in local stack</text>
  <text x="746" y="258" class="component-text">TimescaleDB remains option</text>

  <rect x="728" y="328" width="218" height="82" class="component-current"/>
  <text x="746" y="353" class="component-title">Grafana dashboard</text>
  <text x="746" y="374" class="component-text">provisioned datasource</text>
  <text x="746" y="390" class="component-text">live grid telemetry view</text>

  <rect x="728" y="468" width="218" height="82" class="component"/>
  <text x="746" y="493" class="component-title">Alert and event stream</text>
  <text x="746" y="514" class="component-text">future SIEM transport</text>
  <text x="746" y="530" class="component-text">repeatable evidence trail</text>

  <rect x="1004" y="182" width="238" height="72" class="component-security"/>
  <text x="1022" y="207" class="component-title">Network IDS</text>
  <text x="1022" y="228" class="component-text">Suricata/Zeek on boundary taps</text>
  <text x="1022" y="244" class="mono">flows + protocol anomalies</text>

  <rect x="1004" y="300" width="238" height="72" class="component-security"/>
  <text x="1022" y="325" class="component-title">Telemetry anomaly detector</text>
  <text x="1022" y="346" class="component-text">range, drift, FDIA checks</text>
  <text x="1022" y="362" class="mono">rules first, ML later</text>

  <rect x="1004" y="418" width="238" height="72" class="component"/>
  <text x="1022" y="443" class="component-title">SIEM / alerting</text>
  <text x="1022" y="464" class="component-text">Wazuh or ELK target</text>
  <text x="1022" y="480" class="mono">cases + run logs</text>

  <rect x="1004" y="520" width="238" height="62" class="component-attack"/>
  <text x="1022" y="545" class="component-title">Attack harness</text>
  <text x="1022" y="566" class="component-text">FDIA, flooding, MITM-style tests</text>

  <circle cx="264" cy="238" r="12" class="step"/>
  <text x="261" y="242" class="step-text">1</text>
  <circle cx="501" cy="238" r="12" class="step"/>
  <text x="498" y="242" class="step-text">2</text>
  <circle cx="698" cy="238" r="12" class="step"/>
  <text x="695" y="242" class="step-text">3</text>
  <circle cx="837" cy="302" r="12" class="step"/>
  <text x="834" y="306" class="step-text">4</text>

