  <text x="764" y="745" class="component-title">Gitleaks</text>
  <rect x="900" y="724" width="142" height="34" class="component-ci"/>
  <text x="944" y="745" class="component-title">Trivy</text>
  <rect x="1068" y="724" width="142" height="34" class="component-ci"/>
  <text x="1096" y="745" class="component-title">Smoke tests</text>

  <rect x="40" y="807" width="1240" height="1" fill="#CBD5E1"/>
  <line x1="58" y1="828" x2="92" y2="828" class="current-flow"/>
  <text x="104" y="832" class="legend">Current local pipeline</text>
  <line x1="284" y1="828" x2="318" y2="828" class="planned-flow"/>
  <text x="330" y="832" class="legend">Planned protocol path</text>
  <line x1="548" y1="828" x2="582" y2="828" class="security-flow"/>
  <text x="594" y="832" class="legend">Detection and alert path</text>
