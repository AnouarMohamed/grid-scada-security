<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GridGuard architecture diagram</title>
  <desc id="desc">GridGuard SCADA security lab architecture showing the power simulation track, OT to cloud telemetry boundary, InfluxDB and Grafana observability core, detection services, attack exercises, and CI/CD guardrails.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="40" y1="28" x2="1240" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E" stop-opacity="0.86"/>
      <stop offset="0.5" stop-color="#2563EB" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#1E293B" stroke-width="1" opacity="0.38"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34D399"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#FB7185"/>
    </marker>
    <style>
      .title { fill: #F8FAFC; font: 700 28px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #CBD5E1; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .panel-title { fill: #E5E7EB; font: 700 17px "Segoe UI", Arial, sans-serif; }
      .panel-kicker { fill: #94A3B8; font: 600 11px "Segoe UI", Arial, sans-serif; text-transform: uppercase; }
      .box-title { fill: #F8FAFC; font: 700 14px "Segoe UI", Arial, sans-serif; }
      .box-subtitle { fill: #CBD5E1; font: 500 11px "Segoe UI", Arial, sans-serif; }
      .caption { fill: #94A3B8; font: 500 12px "Segoe UI", Arial, sans-serif; }
      .legend { fill: #CBD5E1; font: 600 12px "Segoe UI", Arial, sans-serif; }
      .small { fill: #94A3B8; font: 500 11px "Segoe UI", Arial, sans-serif; }
      .panel { fill: #0F172A; stroke: #334155; stroke-width: 1.4; }
      .ot-panel { fill: #0D1F2D; stroke: #0E7490; stroke-width: 1.5; }
      .boundary-panel { fill: #182033; stroke: #F59E0B; stroke-width: 1.5; }
      .cloud-panel { fill: #102033; stroke: #2563EB; stroke-width: 1.5; }
      .security-panel { fill: #1D1A2E; stroke: #A855F7; stroke-width: 1.5; }
      .control-panel { fill: #111827; stroke: #475569; stroke-width: 1.3; }
      .box { fill: #111827; stroke: #475569; stroke-width: 1.2; }
      .box-current { fill: #062C36; stroke: #22D3EE; stroke-width: 1.5; }
      .box-future { fill: #111827; stroke: #60A5FA; stroke-width: 1.4; stroke-dasharray: 7 5; }
      .box-sec { fill: #22162A; stroke: #C084FC; stroke-width: 1.3; }
      .box-attack { fill: #2A1620; stroke: #FB7185; stroke-width: 1.3; }
      .box-ci { fill: #101B2E; stroke: #64748B; stroke-width: 1.1; }
      .arrow-current { stroke: #38BDF8; stroke-width: 3; marker-end: url(#arrowBlue); }
      .arrow-future { stroke: #60A5FA; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrowBlue); }
      .arrow-sec { stroke: #A78BFA; stroke-width: 2.5; marker-end: url(#arrowGreen); }
      .arrow-attack { stroke: #FB7185; stroke-width: 2.4; stroke-dasharray: 7 6; marker-end: url(#arrowRed); }
      .arrow-ci { stroke: #34D399; stroke-width: 2.2; stroke-dasharray: 6 6; marker-end: url(#arrowGreen); }
      .divider { stroke: #F59E0B; stroke-width: 1.2; stroke-dasharray: 6 6; opacity: 0.78; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#background)"/>
  <rect width="1280" height="760" fill="url(#grid)" opacity="0.42"/>

  <rect x="40" y="28" width="1200" height="66" rx="18" fill="url(#titleBand)" opacity="0.94"/>
  <text x="68" y="66" class="title">GridGuard Cloud-Native SCADA Security Lab</text>
  <text x="68" y="84" class="subtitle">Digital twin telemetry, explicit OT/cloud boundary, observability, attacks, detection, and CI/CD guardrails</text>

  <g filter="url(#softShadow)">
    <rect x="40" y="126" width="292" height="438" rx="16" class="ot-panel"/>
    <rect x="360" y="126" width="214" height="438" rx="16" class="boundary-panel"/>
    <rect x="602" y="126" width="294" height="438" rx="16" class="cloud-panel"/>
    <rect x="924" y="126" width="316" height="438" rx="16" class="security-panel"/>
    <rect x="40" y="604" width="1200" height="112" rx="16" class="control-panel"/>
  </g>

  <text x="66" y="160" class="panel-kicker">Power Systems Track</text>
  <text x="66" y="184" class="panel-title">Simulation And OT Source</text>

  <text x="386" y="160" class="panel-kicker">Trust Boundary</text>
  <text x="386" y="184" class="panel-title">OT / IT Bridge</text>

  <text x="628" y="160" class="panel-kicker">DevSecOps Track</text>
  <text x="628" y="184" class="panel-title">Cloud Telemetry Core</text>

  <text x="950" y="160" class="panel-kicker">Blue Team Loop</text>
  <text x="950" y="184" class="panel-title">Detection And Response</text>

  <rect x="68" y="214" width="236" height="72" rx="12" class="box"/>
  <text x="90" y="242" class="box-title">Distribution feeder model</text>
  <text x="90" y="263" class="box-subtitle">IEEE feeder, load shape, DER</text>

  <rect x="68" y="318" width="236" height="76" rx="12" class="box-current"/>
  <text x="90" y="346" class="box-title">Fake grid source</text>
  <text x="90" y="367" class="box-subtitle">Current local pipeline</text>
  <text x="90" y="382" class="box-subtitle">195 telemetry points/sample</text>

  <rect x="68" y="426" width="236" height="76" rx="12" class="box-future"/>
  <text x="90" y="454" class="box-title">Modbus / DNP3 emulator</text>
  <text x="90" y="475" class="box-subtitle">Future real protocol source</text>
  <text x="90" y="490" class="box-subtitle">Register map handoff</text>

  <rect x="390" y="242" width="154" height="90" rx="12" class="box-current"/>
  <text x="414" y="273" class="box-title">Telemetry</text>
  <text x="414" y="292" class="box-title">ingestor</text>
  <text x="414" y="313" class="box-subtitle">Only dual-homed</text>

  <line x1="467" y1="350" x2="467" y2="518" class="divider"/>
  <text x="394" y="377" class="small">Boundary rule:</text>
  <text x="394" y="397" class="small">source stays OT-side</text>
  <text x="394" y="416" class="small">DB and dashboards stay</text>
  <text x="394" y="435" class="small">cloud-side only</text>
  <text x="394" y="474" class="small">Future hardening:</text>
  <text x="394" y="494" class="small">mTLS, policy, IDS taps</text>

  <rect x="630" y="214" width="238" height="76" rx="12" class="box-current"/>
  <text x="652" y="243" class="box-title">Time-series storage</text>
  <text x="652" y="264" class="box-subtitle">InfluxDB now</text>
  <text x="652" y="279" class="box-subtitle">TimescaleDB option later</text>

  <rect x="630" y="326" width="238" height="76" rx="12" class="box-current"/>
  <text x="652" y="355" class="box-title">Grafana dashboards</text>
  <text x="652" y="376" class="box-subtitle">Provisioned datasource</text>
  <text x="652" y="391" class="box-subtitle">Live grid overview</text>

  <rect x="630" y="438" width="238" height="76" rx="12" class="box"/>
  <text x="652" y="467" class="box-title">Alert transport</text>
  <text x="652" y="488" class="box-subtitle">SIEM hooks and routing</text>
  <text x="652" y="503" class="box-subtitle">Planned response path</text>

  <rect x="952" y="214" width="260" height="76" rx="12" class="box-sec"/>
  <text x="974" y="243" class="box-title">Network IDS</text>
  <text x="974" y="264" class="box-subtitle">Suricata or Zeek on OT/cloud edge</text>
  <text x="974" y="279" class="box-subtitle">Protocol and flow telemetry</text>

  <rect x="952" y="326" width="260" height="76" rx="12" class="box-sec"/>
  <text x="974" y="355" class="box-title">Anomaly detection</text>
  <text x="974" y="376" class="box-subtitle">Bad data, drift, false injection</text>
  <text x="974" y="391" class="box-subtitle">Rules first, ML later</text>

  <rect x="952" y="438" width="260" height="76" rx="12" class="box-attack"/>
  <text x="974" y="467" class="box-title">Attack exercises</text>
  <text x="974" y="488" class="box-subtitle">FDIA, flooding, MITM-style tests</text>
  <text x="974" y="503" class="box-subtitle">Repeatable run logs</text>

  <path d="M304 356 C332 356 350 288 390 288" class="arrow-current"/>
  <path d="M304 464 C340 464 350 310 390 310" class="arrow-future"/>
  <path d="M544 288 C580 288 590 252 630 252" class="arrow-current"/>
  <path d="M749 290 L749 326" class="arrow-current"/>
  <path d="M868 252 C905 252 914 252 952 252" class="arrow-sec"/>
  <path d="M868 364 C905 364 914 364 952 364" class="arrow-sec"/>
  <path d="M868 476 C902 476 914 476 952 476" class="arrow-attack"/>
  <path d="M952 476 C820 586 480 586 304 464" class="arrow-attack"/>
  <path d="M186 286 L186 318" class="arrow-current"/>
  <path d="M186 394 L186 426" class="arrow-future"/>

  <text x="66" y="640" class="panel-kicker">CI/CD And Infrastructure Control Plane</text>
  <text x="66" y="666" class="panel-title">GitHub Actions, Terraform, Docker, security scans, smoke tests, and deployment approvals</text>

  <rect x="72" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="91" y="699" class="small">Repo hygiene</text>
  <rect x="240" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="264" y="699" class="small">Python tests</text>
  <rect x="408" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="430" y="699" class="small">Terraform validate</text>
  <rect x="576" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="603" y="699" class="small">Docker build</text>
  <rect x="744" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="766" y="699" class="small">Gitleaks and Trivy</text>
  <rect x="912" y="682" width="150" height="24" rx="8" class="box-ci"/>
  <text x="941" y="699" class="small">Stack smoke</text>
  <rect x="1080" y="682" width="130" height="24" rx="8" class="box-ci"/>
  <text x="1105" y="699" class="small">OIDC deploy</text>

  <path d="M208 604 C210 560 186 542 186 502" class="arrow-ci"/>
  <path d="M490 604 C492 560 467 542 467 518" class="arrow-ci"/>
  <path d="M782 604 C782 562 749 540 749 514" class="arrow-ci"/>
  <path d="M1068 604 C1068 560 1082 540 1082 514" class="arrow-ci"/>

  <rect x="40" y="728" width="1200" height="1" fill="#334155"/>
  <circle cx="64" cy="742" r="5" fill="#38BDF8"/>
  <text x="78" y="746" class="legend">Solid blue: running local fake-data pipeline</text>
  <circle cx="330" cy="742" r="5" fill="#60A5FA"/>
  <text x="344" y="746" class="legend">Dashed blue: planned Modbus/DNP3 path</text>
  <circle cx="600" cy="742" r="5" fill="#FB7185"/>
  <text x="614" y="746" class="legend">Red: attack exercises</text>
  <circle cx="798" cy="742" r="5" fill="#34D399"/>
  <text x="812" y="746" class="legend">Green: CI/CD guardrails</text>
</svg>
