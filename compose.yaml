name: gridguard

x-log-policy: &log-policy
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-fake-telemetry-base: &fake-telemetry-base
  build:
    context: ./infra/services/fake-telemetry
  image: gridguard/fake-telemetry:local
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=16m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging: *log-policy

x-modbus-ingestor-base: &modbus-ingestor-base
  build:
    context: ./infra/services/modbus-ingestor
  image: gridguard/modbus-ingestor:local
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=16m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging: *log-policy

services:
  fake-grid-source:
    <<: *fake-telemetry-base
    profiles: ["fake"]
    command: ["source"]
    environment:
      GRIDGUARD_SOURCE_HOST: 0.0.0.0
      GRIDGUARD_SOURCE_PORT: 8080
      GRIDGUARD_FEEDER_ID: ${GRIDGUARD_FEEDER_ID:-ieee-13-demo}
      GRIDGUARD_SCENARIO: ${GRIDGUARD_SCENARIO:-baseline-fake}
    networks:
      - ot-sim
    healthcheck:
      test: ["CMD", "python", "-m", "gridguard_fake_telemetry", "healthcheck-source"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  influxdb:
    image: ${INFLUXDB_IMAGE:-influxdb:2.7}
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-gridguard}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-change-this-local-influx-password}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-gridguard}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-gridguard_telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-change-this-local-influx-token}
    ports:
      - "127.0.0.1:${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - cloud-core
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *log-policy

  telemetry-ingestor:
    <<: *fake-telemetry-base
    profiles: ["fake"]
    command: ["ingest"]
    depends_on:
      fake-grid-source:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      GRIDGUARD_SOURCE_URL: http://fake-grid-source:8080/measurements
      GRIDGUARD_INFLUX_URL: http://influxdb:8086
      GRIDGUARD_INFLUX_ORG: ${INFLUXDB_ORG:-gridguard}
      GRIDGUARD_INFLUX_BUCKET: ${INFLUXDB_BUCKET:-gridguard_telemetry}
      GRIDGUARD_INFLUX_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-change-this-local-influx-token}
      GRIDGUARD_INGEST_INTERVAL_SECONDS: ${GRIDGUARD_INGEST_INTERVAL_SECONDS:-2}
      GRIDGUARD_INGEST_STATUS_FILE: /tmp/gridguard-ingestor-ready
    networks:
      - ot-sim
      - cloud-core
    healthcheck:
      test: ["CMD", "python", "-m", "gridguard_fake_telemetry", "healthcheck-ingestor"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  modbus-ingestor-fixture:
    <<: *modbus-ingestor-base
    profiles: ["modbus-fixture"]
    command: ["ingest"]
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GRIDGUARD_MODBUS_MODE: fixture
      GRIDGUARD_MODBUS_SOURCE_ID: ${GRIDGUARD_MODBUS_SOURCE_ID:-modbus_fixture}
      GRIDGUARD_REGISTER_MAP: /etc/gridguard/register-map.json
      GRIDGUARD_REGISTER_FIXTURE: /etc/gridguard/register-values.json
      GRIDGUARD_MODBUS_INGEST_INTERVAL_SECONDS: ${GRIDGUARD_MODBUS_INGEST_INTERVAL_SECONDS:-2}
      GRIDGUARD_MODBUS_UNIT_ID: ${GRIDGUARD_MODBUS_UNIT_ID:-1}
      GRIDGUARD_MODBUS_STATUS_FILE: /tmp/gridguard-modbus-ingestor-ready
      GRIDGUARD_INFLUX_URL: http://influxdb:8086
      GRIDGUARD_INFLUX_ORG: ${INFLUXDB_ORG:-gridguard}
      GRIDGUARD_INFLUX_BUCKET: ${INFLUXDB_BUCKET:-gridguard_telemetry}
      GRIDGUARD_INFLUX_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-change-this-local-influx-token}
    volumes:
      - ./infra/contracts/register-maps/ieee13-demo.json:/etc/gridguard/register-map.json:ro
      - ./infra/contracts/register-maps/fixtures/ieee13-baseline-registers.json:/etc/gridguard/register-values.json:ro
    networks:
      - ot-sim
      - cloud-core
    healthcheck:
      test: ["CMD", "python", "-m", "gridguard_modbus_ingestor", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.5.2}
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-this-local-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: "false"
      INFLUXDB_ORG: ${INFLUXDB_ORG:-gridguard}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-gridguard_telemetry}
      INFLUXDB_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-change-this-local-influx-token}
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/local/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/local/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/local/grafana/dashboards:/var/lib/grafana/dashboards/gridguard:ro
    networks:
      - cloud-core
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *log-policy

networks:
  ot-sim:
    internal: true
    labels:
      com.gridguard.zone: ot-sim
      com.gridguard.boundary: simulated-operational-technology
  cloud-core:
    labels:
      com.gridguard.zone: cloud-core
      com.gridguard.boundary: telemetry-platform

volumes:
  influxdb-data:
  grafana-data:
