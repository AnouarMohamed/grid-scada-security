name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate repository hygiene
        run: bash scripts/ci/validate-repo-hygiene.sh

      - name: Validate documentation
        run: bash scripts/ci/validate-docs.sh

  python:
    name: Python Lint, Test, and SAST
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            **/requirements*.txt
            pyproject.toml
            **/pyproject.toml

      - name: Validate Python
        run: bash scripts/ci/validate-python.sh

  terraform:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform
        run: bash scripts/ci/validate-terraform.sh

  docker:
    name: Docker and Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Docker artifacts
        run: bash scripts/ci/validate-docker.sh

  security:
    name: Secrets and Dependency Scans
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan filesystem for vulnerabilities and IaC risk
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - hygiene
      - python
      - terraform
      - docker
      - security
    if: always()
    steps:
      - name: Require all CI jobs to pass
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
          echo "All CI jobs passed."
