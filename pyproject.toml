[tool.pytest.ini_options]
testpaths = [
    "infra/services/fake-telemetry/tests",
    "infra/services/modbus-ingestor/tests",
]
pythonpath = [
    "infra/services/fake-telemetry/src",
    "infra/services/modbus-ingestor/src",
]

[tool.ruff]
line-length = 96
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
